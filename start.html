<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubi Quiz Battle - Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p1-color: #3498db; --p2-color: #e74c3c; --success: #2ecc71; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; transition: background 0.2s; }
        #game-container { background: var(--glass); width: 90%; max-width: 600px; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); backdrop-filter: blur(10px); position: relative; text-align: center; }
        .hidden { display: none !important; }
        
        /* Timer Bar */
        #timer-bar { height: 10px; background: #eee; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #timer-progress { height: 100%; background: var(--p1-color); width: 100%; transition: width 1s linear; }

        .scoreboard { display: flex; gap: 15px; margin-bottom: 20px; }
        .player-card { flex: 1; padding: 15px; border-radius: 12px; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .question-text { font-size: 20px; font-weight: 700; margin-bottom: 20px; min-height: 50px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { padding: 15px; border: 2px solid #ddd; border-radius: 10px; background: #fff; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .opt-btn:disabled { cursor: not-allowed; }
        .correct-flash { background: var(--success) !important; color: white !important; }
        .wrong-flash { background: var(--p2-color) !important; color: white !important; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white; }
        
        /* Hiệu ứng kịch tính */
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .flash-red { background: rgba(231, 76, 60, 0.3) !important; }
    </style>
</head>
<body>

<audio id="audio-correct" src="https://drive.google.com/drive/u/0/home" preload="auto"></audio>
<audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2959/2959-preview.mp3" preload="auto"></audio>
<audio id="audio-victory" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
<audio id="audio-bgm" src="https://drive.google.com/drive/u/0/home" loop preload="auto"></audio>

<div id="overlay" class="hidden">
    <h2 style="font-size: 28px;">🎮 TRẬN ĐẤU SẴN SÀNG!</h2>
    <p style="margin-bottom: 20px; opacity: 0.8;">Bật âm thanh để trải nghiệm tốt nhất.</p>
    <button onclick="unlockAudio()" style="padding: 15px 40px; font-size: 20px; background: var(--success); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">VÀO TRẬN</button>
</div>

<div id="game-container">
    <div id="screen-lobby">
        <h2>Hubi Quiz Lobby</h2>
        <div id="room-link-container" class="hidden">
            <p>Link mời đối thủ:</p>
            <input type="text" id="invite-link" readonly style="width: 80%; padding: 10px; text-align: center; border-radius: 5px; border: 1px solid #ddd;">
            <button onclick="copyLink()" style="margin-top: 10px; padding: 8px 20px; background: var(--p1-color); color:white; border:none; border-radius:5px; cursor:pointer;">Copy Link</button>
        </div>
        <p id="lobby-status" style="margin-top: 20px; font-style: italic;">Đang khởi tạo...</p>
    </div>

    <div id="screen-game" class="hidden">
        <div id="timer-bar"><div id="timer-progress"></div></div>
        <div class="scoreboard">
            <div class="player-card"><b>P1:</b> <span id="score-p1">0</span>đ</div>
            <div class="player-card"><b>P2:</b> <span id="score-p2">0</span>đ</div>
        </div>
        <div class="question-text" id="q-text"></div>
        <div id="q-options" class="options-grid"></div>
    </div>

    <div id="screen-result" class="hidden">
        <h1 id="winner-title"></h1>
        <p id="final-summary" style="font-size: 24px; margin: 20px 0;"></p>
        <button onclick="location.reload()" style="padding: 12px 30px; cursor:pointer;">Chơi ván mới</button>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://tyhqwaunmanubqqyifwj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5aHF3YXVubWFudWJxcXlpZndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4ODg4ODAsImV4cCI6MjA4ODQ2NDg4MH0.7BSrbAV2WSY5gqZxQwG4-QybRaF-DNbDceNmFiVF1cQ';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let roomId, isP1 = false, myIdx = 0, timeLeft = 15, timerInterval;
let playersData = { p1_score: 0, p2_score: 0 };
const user = JSON.parse(localStorage.getItem('hubi_user')) || { id: 'u' + Date.now(), email: 'Guest@hubi.com' };

const myData = [
    // --- NHÓM 1: SO SÁNH KÉP (DOUBLE COMPARATIVE) ---
    { 
        q: "Life in rural areas is becoming ______ difficult for farmers because of falling prices of agricultural products.", 
        options: ["less and less", "fewer and fewer", "more and more", "more and less"], 
        correct: "more and more" 
    },
    { 
        q: "The more children sleep, ______ they are.", 
        options: ["the healthiest", "the healthier", "healthier", "more healthy"], 
        correct: "the healthier" 
    },
    { 
        q: "She is losing ______ money because of her poor investment decisions.", 
        options: ["more and more", "fewer and fewer", "less and less", "many and many"], 
        correct: "more and more" 
    },

    // --- NHÓM 2: CÔNG NGHỆ & TRÍ TUỆ NHÂN TẠO (AI) ---
    { 
        q: "Artificial intelligence ______ to revolutionize the way we live and work in the next decade.", 
        options: ["expects", "is expecting", "is expected", "expected"], 
        correct: "is expected" 
    },
    { 
        q: "By this time next year, scientists ______ a more sophisticated AI model.", 
        options: ["develop", "will develop", "are developing", "will have developed"], 
        correct: "will have developed" 
    },
    { 
        q: "______ AI has many benefits, there are also concerns about its ethical implications.", 
        options: ["Because", "Despite", "While", "Therefore"], 
        correct: "While" 
    },
    { 
        q: "The government is considering new regulations ______ the development of AI.", 
        options: ["to govern", "governed", "govern", "governing"], 
        correct: "to govern" 
    },

    // --- NHÓM 3: MỆNH ĐỀ QUAN HỆ & LIÊN TỪ ---
    { 
        q: "Mount Fuji in Japan is the most beautiful place we ______.", 
        options: ["had ever visited", "have ever visited", "have ever visit", "had ever visit"], 
        correct: "have ever visited" 
    },
    { 
        q: "Plastic takes hundreds of years to decompose in the ground, ______ is bad for the environment.", 
        options: ["Which", "Who", "That", "When"], 
        correct: "Which" 
    },
    { 
        q: "The anchor reported the news calmly, ______ he were completely unaware of the serious situation.", 
        options: ["so that", "even though", "as if", "because"], 
        correct: "as if" 
    },

    // --- NHÓM 4: CỤM ĐỘNG TỪ (PHRASAL VERBS) & GIỚI TỪ ---
    { 
        q: "A group of students carried ______ research on Korean culture and cuisine.", 
        options: ["for", "out", "off", "by"], 
        correct: "out" 
    },
    { 
        q: "My grandparents looked ______ my brother when he was small.", 
        options: ["with", "at", "into", "after"], 
        correct: "after" 
    },
    { 
        q: "Please turn off ______ lights when you leave ______ room.", 
        options: ["the/the", "a/a", "the/a", "a/the"], 
        correct: "the/the" 
    },
    { 
        q: "I ______ the accident when I was waiting for the taxi.", 
        options: ["was seeing", "saw", "seen", "see"], 
        correct: "saw" 
    },

    // --- NHÓM 5: TỔNG HỢP KIẾN THỨC NÂNG CAO ---
    { 
        q: "Protecting wildlife is ______ important than before because many species are endangered.", 
        options: ["very", "more", "most", "as"], 
        correct: "more" 
    },
    { 
        q: "If people were more aware of wildlife conservation, the situation would be much ______.", 
        options: ["good", "well", "better", "best"], 
        correct: "better" 
    },
    { 
        q: "The more you practice speaking English, ______ you will become.", 
        options: ["the more fluently", "the most fluently", "the more fluent", "more fluent"], 
        correct: "the more fluent" 
    },
    { 
        q: "The city is becoming ______ crowded as more people move from the countryside.", 
        options: ["more and more", "less and less", "fewer and fewer", "most and most"], 
        correct: "more and more" 
    },
    { 
        q: "No sooner had he arrived ______ the rain started to pour down.", 
        options: ["than", "when", "then", "that"], 
        correct: "than" 
    },
    { 
        q: "Hardly ______ entered the office when the phone rang.", 
        options: ["had he", "he had", "did he", "has he"], 
        correct: "had he" 
    },

    // --- NHÓM 6: CÂU ĐÚNG / SAI (THỂ SAI KHIẾN & NGỮ PHÁP) ---
    { 
        q: "Cấu trúc: 'Anna got her brother to repair her bike' là đúng hay sai?", 
        options: ["Đúng", "Sai"], 
        correct: "Đúng" 
    },
    { 
        q: "Câu: 'He get his house renovated by a team' là đúng hay sai? (Gợi ý: Chia động từ)", 
        options: ["Đúng", "Sai"], 
        correct: "Sai" 
    },
    { 
        q: "Câu: 'Mr. Smith is an old customer and a honest man' là đúng hay sai?", 
        options: ["Đúng", "Sai"], 
        correct: "Sai" 
    },
    { 
        q: "Cấu trúc: 'We got our house painted last summer' (Thể bị động sai khiến) là đúng?", 
        options: ["Đúng", "Sai"], 
        correct: "Đúng" 
    },
    { 
        q: "Câu: 'The more he works, the most tired he feels' là đúng hay sai?", 
        options: ["Đúng", "Sai"], 
        correct: "Sai" 
    }
];

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('room');

    if (joinId) {
        roomId = joinId; isP1 = false;
        await supabaseClient.from('rooms').update({ p2_id: user.id, p2_name: user.email.split('@')[0], status: 'playing' }).eq('id', roomId);
    } else {
        isP1 = true;
        const { data } = await supabaseClient.from('rooms').insert([{ p1_id: user.id, p1_name: user.email.split('@')[0], status: 'waiting' }]).select();
        if (data?.[0]) {
            roomId = data[0].id;
            document.getElementById('invite-link').value = window.location.href + '?room=' + roomId;
            document.getElementById('room-link-container').classList.remove('hidden');
            document.getElementById('lobby-status').innerText = "Đang đợi đối thủ vào...";
        }
    }
    listenRealtime();
}

function listenRealtime() {
    supabaseClient.channel(`room:${roomId}`).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${roomId}` }, payload => {
        const room = payload.new;
        playersData.p1_score = Number(room.p1_score) || 0;
        playersData.p2_score = Number(room.p2_score) || 0;
        document.getElementById('score-p1').innerText = playersData.p1_score;
        document.getElementById('score-p2').innerText = playersData.p2_score;

        if (room.status === 'playing' && document.getElementById('screen-game').classList.contains('hidden')) {
            document.getElementById('overlay').classList.remove('hidden');
        }
        if (room.p1_idx >= myData.length && room.p2_idx >= myData.length) showFinalResult();
    }).subscribe();
}

function unlockAudio() {
    const bgm = document.getElementById('audio-bgm');
    const correct = document.getElementById('audio-correct');
    const wrong = document.getElementById('audio-wrong');
    const victory = document.getElementById('audio-victory');

    [bgm, correct, wrong, victory].forEach(a => {
        a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
    });

    bgm.volume = 0.15;
    bgm.play();
    
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('screen-lobby').classList.add('hidden');
    document.getElementById('screen-game').classList.remove('hidden');
    renderQuestion();
}

function renderQuestion() {
    if (myIdx >= myData.length) {
        clearInterval(timerInterval);
        document.getElementById('q-text').innerText = "Đã xong! Đợi đối thủ...";
        document.getElementById('q-options').innerHTML = "";
        return;
    }
    timeLeft = 15;
    document.getElementById('timer-progress').style.width = "100%";
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-progress').style.width = (timeLeft/15*100) + "%";
        if (timeLeft <= 0) submitAnswer("", "");
    }, 1000);

    const item = myData[myIdx];
    document.getElementById('q-text').innerText = item.q;
    document.getElementById('q-options').innerHTML = item.options.map(opt => `<button class="opt-btn" onclick="submitAnswer('${opt}', '${item.correct}')">${opt}</button>`).join('');
}

async function submitAnswer(selected, correct) {
    clearInterval(timerInterval);
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => b.disabled = true);

    let isCorrect = (selected === correct);
    if (isCorrect && selected !== "") {
        document.getElementById('audio-correct').play().catch(() => {});
        btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct-flash'); });
    } else if (selected !== "") {
        document.getElementById('audio-wrong').play().catch(() => {});
        
        // Hiệu ứng kịch tính khi sai: Rung + Nháy đỏ
        document.getElementById('game-container').classList.add('shake');
        document.body.classList.add('flash-red');
        setTimeout(() => {
            document.getElementById('game-container').classList.remove('shake');
            document.body.classList.remove('flash-red');
        }, 400);

        btns.forEach(b => {
            if(b.innerText === correct) b.classList.add('correct-flash');
            if(b.innerText === selected) b.classList.add('wrong-flash');
        });
    }

    myIdx++;
    const scoreGain = isCorrect ? 4 : 0;
    const currentScore = isP1 ? playersData.p1_score : playersData.p2_score;
    const updateData = isP1 ? { p1_score: currentScore + scoreGain, p1_idx: myIdx } : { p2_score: currentScore + scoreGain, p2_idx: myIdx };

    await supabaseClient.from('rooms').update(updateData).eq('id', roomId);
    setTimeout(renderQuestion, 1200);
}

function showFinalResult() {
    document.getElementById('audio-bgm').pause();
    document.getElementById('audio-victory').play().catch(() => {});
    
    document.getElementById('screen-game').classList.add('hidden');
    document.getElementById('screen-result').classList.remove('hidden');
    
    const s1 = playersData.p1_score, s2 = playersData.p2_score;
    let title = s1 > s2 ? "🏆 P1 CHIẾN THẮNG!" : (s2 > s1 ? "🏆 P2 CHIẾN THẮNG!" : "🤝 HÒA NHAU!");
    document.getElementById('winner-title').innerText = title;
    document.getElementById('final-summary').innerText = `Tỉ số: ${s1} - ${s2}`;
    
    confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
}

function copyLink() {
    const copyText = document.getElementById("invite-link");
    copyText.select();
    navigator.clipboard.writeText(copyText.value);
    alert("Đã copy link mời!");
}

init();
</script>
</body>
</html>
