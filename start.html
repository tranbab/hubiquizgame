<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubi Online Quiz Battle</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
 :root { --p1-color: #3498db; --p2-color: #e74c3c; --success: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #game-container { background: white; width: 90%; max-width: 800px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        
        /* Giao diện phòng chờ */
        .lobby-box { padding: 20px; background: #e8f4fd; border-radius: 10px; border: 2px dashed #3498db; margin-bottom: 20px; }
        .copy-link { cursor: pointer; color: #3498db; font-weight: bold; text-decoration: underline; }

        /* Bảng điểm */
        .scoreboard { display: flex; gap: 20px; margin-bottom: 20px; }
        .player-card { flex: 1; padding: 15px; border-radius: 10px; border: 2px solid #ddd; transition: 0.3s; }
        .player-card.active { border-color: var(--success); background: #fafffa; transform: translateY(-5px); }
        .p1-tag { color: var(--p1-color); font-weight: bold; }
        .p2-tag { color: var(--p2-color); font-weight: bold; }

        /* Câu hỏi */
        .question-text { font-size: 22px; font-weight: bold; margin-bottom: 25px; color: #2c3e50; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn { padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .opt-btn:hover { background: #f8f9fa; border-color: #3498db; }
        
        .timer { font-size: 24px; color: #e67e22; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="screen-lobby">
        <h2>🎮 Chế độ Battle Online</h2>
        <div class="lobby-box">
            <p id="lobby-status">Đang khởi tạo phòng...</p>
            <p id="room-link-container" class="hidden">Gửi link này cho bạn bè: <br> 
               <span class="copy-link" id="invite-link" onclick="copyLink()">Đang lấy link...</span>
            </p>
        </div>
        <p><i>Lưu ý: Game sẽ tự bắt đầu khi có người thứ 2 tham gia.</i></p>
    </div>

    <div id="screen-game" class="hidden">
        <div class="timer">⏳ Thời gian: <span id="time-val">05:00</span></div>
        <div class="scoreboard">
            <div id="card-p1" class="player-card">
                <span class="p1-tag">Người chơi 1</span><br>
                <span id="name-p1">...</span>: <b id="score-p1">0</b>đ
            </div>
            <div id="card-p2" class="player-card">
                <span class="p2-tag">Người chơi 2</span><br>
                <span id="name-p2">...</span>: <b id="score-p2">0</b>đ
            </div>
        </div>
        <div class="question-text" id="q-text">Đang tải câu hỏi...</div>
        <div class="options-grid" id="q-options"></div>
    </div>

    <div id="screen-result" class="hidden">
        <h1 id="winner-title">🏆 CHÚC MỪNG!</h1>
        <p id="final-summary" style="font-size: 20px;"></p>
        <button onclick="location.href='start.html'" style="padding: 10px 20px; cursor:pointer;">Về trang chủ</button>
    </div>
</div>

<script>
// --- CẤU HÌNH ---
const SUPABASE_URL = 'https://tyhqwaunmanubqqyifwj.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ykUNI3N6ih0sgmcN4K7OZw_MRYljw-U';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const user = JSON.parse(localStorage.getItem('hubi_user'));
let roomId = null;
let isP1 = false;
let myIdx = 0;
let playersData = { p1_score: 0, p2_score: 0 };

const myData = [
    // --- NHÓM 1: SO SÁNH KÉP (DOUBLE COMPARATIVE) ---
    { 
        q: "Life in rural areas is becoming ______ difficult for farmers because of falling prices of agricultural products.", 
        options: ["less and less", "fewer and fewer", "more and more", "more and less"], 
        correct: "more and more" 
    },
    { 
        q: "The more children sleep, ______ they are.", 
        options: ["the healthiest", "the healthier", "healthier", "more healthy"], 
        correct: "the healthier" 
    },
    { 
        q: "She is losing ______ money because of her poor investment decisions.", 
        options: ["more and more", "fewer and fewer", "less and less", "many and many"], 
        correct: "more and more" 
    },

    // --- NHÓM 2: CÔNG NGHỆ & TRÍ TUỆ NHÂN TẠO (AI) ---
    { 
        q: "Artificial intelligence ______ to revolutionize the way we live and work in the next decade.", 
        options: ["expects", "is expecting", "is expected", "expected"], 
        correct: "is expected" 
    },
    { 
        q: "By this time next year, scientists ______ a more sophisticated AI model.", 
        options: ["develop", "will develop", "are developing", "will have developed"], 
        correct: "will have developed" 
    },
    { 
        q: "______ AI has many benefits, there are also concerns about its ethical implications.", 
        options: ["Because", "Despite", "While", "Therefore"], 
        correct: "While" 
    },
    { 
        q: "The government is considering new regulations ______ the development of AI.", 
        options: ["to govern", "governed", "govern", "governing"], 
        correct: "to govern" 
    },

    // --- NHÓM 3: MỆNH ĐỀ QUAN HỆ & LIÊN TỪ ---
    { 
        q: "Mount Fuji in Japan is the most beautiful place we ______.", 
        options: ["had ever visited", "have ever visited", "have ever visit", "had ever visit"], 
        correct: "have ever visited" 
    },
    { 
        q: "Plastic takes hundreds of years to decompose in the ground, ______ is bad for the environment.", 
        options: ["Which", "Who", "That", "When"], 
        correct: "Which" 
    },
    { 
        q: "The anchor reported the news calmly, ______ he were completely unaware of the serious situation.", 
        options: ["so that", "even though", "as if", "because"], 
        correct: "as if" 
    },

    // --- NHÓM 4: CỤM ĐỘNG TỪ (PHRASAL VERBS) & GIỚI TỪ ---
    { 
        q: "A group of students carried ______ research on Korean culture and cuisine.", 
        options: ["for", "out", "off", "by"], 
        correct: "out" 
    },
    { 
        q: "My grandparents looked ______ my brother when he was small.", 
        options: ["with", "at", "into", "after"], 
        correct: "after" 
    },
    { 
        q: "Please turn off ______ lights when you leave ______ room.", 
        options: ["the/the", "a/a", "the/a", "a/the"], 
        correct: "the/the" 
    },
    { 
        q: "I ______ the accident when I was waiting for the taxi.", 
        options: ["was seeing", "saw", "seen", "see"], 
        correct: "saw" 
    },

    // --- NHÓM 5: TỔNG HỢP KIẾN THỨC NÂNG CAO ---
    { 
        q: "Protecting wildlife is ______ important than before because many species are endangered.", 
        options: ["very", "more", "most", "as"], 
        correct: "more" 
    },
    { 
        q: "If people were more aware of wildlife conservation, the situation would be much ______.", 
        options: ["good", "well", "better", "best"], 
        correct: "better" 
    },
    { 
        q: "The more you practice speaking English, ______ you will become.", 
        options: ["the more fluently", "the most fluently", "the more fluent", "more fluent"], 
        correct: "the more fluent" 
    },
    { 
        q: "The city is becoming ______ crowded as more people move from the countryside.", 
        options: ["more and more", "less and less", "fewer and fewer", "most and most"], 
        correct: "more and more" 
    },
    { 
        q: "No sooner had he arrived ______ the rain started to pour down.", 
        options: ["than", "when", "then", "that"], 
        correct: "than" 
    },
    { 
        q: "Hardly ______ entered the office when the phone rang.", 
        options: ["had he", "he had", "did he", "has he"], 
        correct: "had he" 
    },

    // --- NHÓM 6: CÂU ĐÚNG / SAI (THỂ SAI KHIẾN & NGỮ PHÁP) ---
    { 
        q: "Cấu trúc: 'Anna got her brother to repair her bike' là đúng hay sai?", 
        options: ["Đúng", "Sai"], 
        correct: "Đúng" 
    },
    { 
        q: "Câu: 'He get his house renovated by a team' là đúng hay sai? (Gợi ý: Chia động từ)", 
        options: ["Đúng", "Sai"], 
        correct: "Sai" 
    },
    { 
        q: "Câu: 'Mr. Smith is an old customer and a honest man' là đúng hay sai?", 
        options: ["Đúng", "Sai"], 
        correct: "Sai" 
    },
    { 
        q: "Cấu trúc: 'We got our house painted last summer' (Thể bị động sai khiến) là đúng?", 
        options: ["Đúng", "Sai"], 
        correct: "Đúng" 
    },
    { 
        q: "Câu: 'The more he works, the most tired he feels' là đúng hay sai?", 
        options: ["Đúng", "Sai"], 
        correct: "Sai" 
    }
];
// 1. KHỞI TẠO TRẬN ĐẤU
async function initBattle() {
    if (!user) { alert("Bạn cần đăng nhập trước!"); window.location.href='index.html'; return; }

    const urlParams = new URLSearchParams(window.location.search);
    const joinRoomId = urlParams.get('room');

    if (joinRoomId) {
        // NGƯỜI CHƠI 2: Tham gia phòng
        roomId = joinRoomId;
        isP1 = false;
        const { error } = await supabaseClient.from('rooms').update({ 
            p2_id: user.id, 
            p2_name: user.email.split('@')[0], 
            status: 'playing' 
        }).eq('id', roomId);
        
        if(error) alert("Phòng không tồn tại hoặc đã đầy!");
    } else {
        // NGƯỜI CHƠI 1: Tạo phòng
        isP1 = true;
        const { data, error } = await supabaseClient.from('rooms').insert([{
            p1_id: user.id,
            p1_name: user.email.split('@')[0],
            status: 'waiting'
        }]).select();

        if (data) {
            roomId = data[0].id;
            const fullLink = window.location.href + '?room=' + roomId;
            document.getElementById('invite-link').innerText = fullLink;
            document.getElementById('room-link-container').classList.remove('hidden');
            document.getElementById('lobby-status').innerText = "Đang đợi đối thủ...";
        }
    }
    listenRealtime();
}

// 2. LẮNG NGHE ĐỒNG BỘ (REALTIME)
function listenRealtime() {
    supabaseClient.channel(`room:${roomId}`)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${roomId}` }, 
    payload => {
        const room = payload.new;
        
        // Cập nhật điểm số và tên
        document.getElementById('score-p1').innerText = room.p1_score;
        document.getElementById('score-p2').innerText = room.p2_score;
        playersData.p1_score = room.p1_score;
        playersData.p2_score = room.p2_score;

        // Chuyển sang màn hình chơi game
        if (room.status === 'playing' && document.getElementById('screen-game').classList.contains('hidden')) {
            showGameUI(room);
        }

        // ĐIỀU KIỆN KẾT THÚC: Chỉ hiện kết quả khi cả 2 đã xong hết câu hỏi
        if (room.p1_idx >= myData.length && room.p2_idx >= myData.length) {
            showResult();
        }
    }).subscribe();
}

// 3. HIỂN THỊ CÂU HỎI
function renderQuestion() {
    // Kiểm tra nếu bạn đã hoàn thành tất cả câu hỏi trong myData
    if (myIdx >= myData.length) {
        document.getElementById('q-text').innerText = "Đang đợi đối thủ hoàn thành...";
        document.getElementById('q-options').innerHTML = '<div class="loader"></div>';
        return;
    }

    const q = myData[myIdx]; // Sử dụng myIdx thay vì currentIdx
    document.getElementById('q-text').innerText = `Câu ${myIdx + 1}: ${q.q}`;
    const area = document.getElementById('q-options');
    area.innerHTML = '';
    
    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerText = opt;
        // Khi bấm vào, sẽ gọi hàm submitAnswer bên dưới
        btn.onclick = () => submitAnswer(opt, q.correct); 
        area.appendChild(btn);
    });
}
// 4. GỬI ĐÁP ÁN LÊN SQL
async function submitAnswer(selected, correct) {
    let scoreGain = (selected === correct) ? 4 : 0;
    myIdx++; // Tăng chỉ số câu hỏi của RIÊNG bạn lên 1

    // Quyết định cập nhật vào cột p1_idx hay p2_idx dựa trên việc bạn là người chơi 1 hay 2
    const updatePayload = isP1 
        ? { p1_score: playersData.p1_score + scoreGain, p1_idx: myIdx }
        : { p2_score: playersData.p2_score + scoreGain, p2_idx: myIdx };

    // Gửi dữ liệu lên Supabase để đối thủ thấy được điểm và tiến độ của bạn
    await supabaseClient.from('rooms').update(updatePayload).eq('id', roomId);
    
    // Quan trọng: Gọi lại renderQuestion ngay lập tức để sang câu tiếp theo cho bạn
    renderQuestion(); 
}

function showGameUI(room) {
    document.getElementById('screen-lobby').classList.add('hidden');
    document.getElementById('screen-game').classList.remove('hidden');
    document.getElementById('name-p1').innerText = room.p1_name;
    document.getElementById('name-p2').innerText = room.p2_name;
    renderQuestion();
}

function showResult() {
    document.getElementById('screen-game').classList.add('hidden');
    document.getElementById('screen-result').classList.remove('hidden');
    
    const s1 = playersData.p1_score;
    const s2 = playersData.p2_score;
    let msg = s1 > s2 ? "Người chơi 1 thắng!" : (s2 > s1 ? "Người chơi 2 thắng!" : "Hòa nhau!");
    
    document.getElementById('winner-title').innerText = "🏆 " + msg;
    document.getElementById('final-summary').innerText = `Tỉ số: ${s1} - ${s2}`;
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
}

function copyLink() {
    const link = document.getElementById('invite-link').innerText;
    navigator.clipboard.writeText(link);
    alert("Đã copy link! Hãy gửi cho bạn bè.");
}

initBattle();
</script>
</body>

</html>
