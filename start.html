<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubi Online Quiz Battle - Professional</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p1-color: #3498db; --p2-color: #e74c3c; --success: #2ecc71; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        #game-container { background: var(--glass); width: 90%; max-width: 700px; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); backdrop-filter: blur(10px); position: relative; }
        .hidden { display: none !important; }
        
        /* Timer Style */
        #timer-bar { height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        #timer-progress { height: 100%; background: var(--p1-color); width: 100%; transition: width 1s linear; }

        .lobby-box { padding: 30px; background: #f0f7ff; border-radius: 15px; border: 2px dashed #3498db; text-align: center; }
        .copy-link { cursor: pointer; color: #3498db; font-weight: bold; text-decoration: underline; word-break: break-all; }
        .scoreboard { display: flex; gap: 20px; margin-bottom: 20px; }
        .player-card { flex: 1; padding: 15px; border-radius: 12px; background: #fff; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .question-text { font-size: 22px; font-weight: 700; margin-bottom: 25px; min-height: 60px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn { padding: 18px; border: 2px solid #e2e8f0; border-radius: 12px; background: #fff; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .opt-btn:not(:disabled):hover { background: #3498db; color: white; transform: translateY(-2px); }
        .correct-flash { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .wrong-flash { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body>

<audio id="audio-correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>
<audio id="audio-wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3" preload="auto"></audio>
<audio id="audio-bgm" src="https://www.soundjay.com/free-music/sounds/midnight-ride-01a.mp3" loop preload="auto"></audio>

<div id="game-container">
    <div id="screen-lobby">
        <h2>🎮 Hubi Battle Online</h2>
        <div class="lobby-box">
            <p id="lobby-status">Đang tạo phòng...</p>
            <div id="room-link-container" class="hidden">
                <p>Gửi link này cho bạn bè:</p>
                <span class="copy-link" id="invite-link" onclick="copyLink()">Đang lấy link...</span>
            </div>
        </div>
    </div>

    <div id="screen-game" class="hidden">
        <div id="timer-bar"><div id="timer-progress"></div></div>
        <div class="scoreboard">
            <div class="player-card"><span id="name-p1">P1</span>: <b id="score-p1">0</b>đ</div>
            <div class="player-card"><span id="name-p2">P2</span>: <b id="score-p2">0</b>đ</div>
        </div>
        <div class="question-text" id="q-text">Đang tải câu hỏi...</div>
        <div id="q-options" class="options-grid"></div>
    </div>

    <div id="screen-result" class="hidden" style="text-align:center;">
        <h1 id="winner-title"></h1>
        <p id="final-summary" style="font-size:22px; margin: 20px 0;"></p>
        <button onclick="location.reload()" style="padding:15px 40px; background:#3498db; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">Chơi ván mới</button>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://tyhqwaunmanubqqyifwj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5aHF3YXVubWFudWJxcXlpZndqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4ODg4ODAsImV4cCI6MjA4ODQ2NDg4MH0.7BSrbAV2WSY5gqZxQwG4-QybRaF-DNbDceNmFiVF1cQ';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const user = JSON.parse(localStorage.getItem('hubi_user')) || { id: 'user-' + Math.random(), email: 'Player@hubi.com' };
let roomId, isP1 = false, myIdx = 0, timeLeft = 15, timerInterval;
let playersData = { p1_score: 0, p2_score: 0 };
const myData = [
    // --- NHÓM 1: SO SÁNH KÉP (DOUBLE COMPARATIVE) ---
    { 
        q: "Life in rural areas is becoming ______ difficult for farmers because of falling prices of agricultural products.", 
        options: ["less and less", "fewer and fewer", "more and more", "more and less"], 
        correct: "more and more" 
    },
    { 
        q: "The more children sleep, ______ they are.", 
        options: ["the healthiest", "the healthier", "healthier", "more healthy"], 
        correct: "the healthier" 
    },
    { 
        q: "She is losing ______ money because of her poor investment decisions.", 
        options: ["more and more", "fewer and fewer", "less and less", "many and many"], 
        correct: "more and more" 
    },

    // --- NHÓM 2: CÔNG NGHỆ & TRÍ TUỆ NHÂN TẠO (AI) ---
    { 
        q: "Artificial intelligence ______ to revolutionize the way we live and work in the next decade.", 
        options: ["expects", "is expecting", "is expected", "expected"], 
        correct: "is expected" 
    },
    { 
        q: "By this time next year, scientists ______ a more sophisticated AI model.", 
        options: ["develop", "will develop", "are developing", "will have developed"], 
        correct: "will have developed" 
    },
    { 
        q: "______ AI has many benefits, there are also concerns about its ethical implications.", 
        options: ["Because", "Despite", "While", "Therefore"], 
        correct: "While" 
    },
    { 
        q: "The government is considering new regulations ______ the development of AI.", 
        options: ["to govern", "governed", "govern", "governing"], 
        correct: "to govern" 
    },

    // --- NHÓM 3: MỆNH ĐỀ QUAN HỆ & LIÊN TỪ ---
    { 
        q: "Mount Fuji in Japan is the most beautiful place we ______.", 
        options: ["had ever visited", "have ever visited", "have ever visit", "had ever visit"], 
        correct: "have ever visited" 
    },
    { 
        q: "Plastic takes hundreds of years to decompose in the ground, ______ is bad for the environment.", 
        options: ["Which", "Who", "That", "When"], 
        correct: "Which" 
    },
    { 
        q: "The anchor reported the news calmly, ______ he were completely unaware of the serious situation.", 
        options: ["so that", "even though", "as if", "because"], 
        correct: "as if" 
    },

    // --- NHÓM 4: CỤM ĐỘNG TỪ (PHRASAL VERBS) & GIỚI TỪ ---
    { 
        q: "A group of students carried ______ research on Korean culture and cuisine.", 
        options: ["for", "out", "off", "by"], 
        correct: "out" 
    },
    { 
        q: "My grandparents looked ______ my brother when he was small.", 
        options: ["with", "at", "into", "after"], 
        correct: "after" 
    },
    { 
        q: "Please turn off ______ lights when you leave ______ room.", 
        options: ["the/the", "a/a", "the/a", "a/the"], 
        correct: "the/the" 
    },
    { 
        q: "I ______ the accident when I was waiting for the taxi.", 
        options: ["was seeing", "saw", "seen", "see"], 
        correct: "saw" 
    },

    // --- NHÓM 5: TỔNG HỢP KIẾN THỨC NÂNG CAO ---
    { 
        q: "Protecting wildlife is ______ important than before because many species are endangered.", 
        options: ["very", "more", "most", "as"], 
        correct: "more" 
    },
    { 
        q: "If people were more aware of wildlife conservation, the situation would be much ______.", 
        options: ["good", "well", "better", "best"], 
        correct: "better" 
    },
    { 
        q: "The more you practice speaking English, ______ you will become.", 
        options: ["the more fluently", "the most fluently", "the more fluent", "more fluent"], 
        correct: "the more fluent" 
    },
    { 
        q: "The city is becoming ______ crowded as more people move from the countryside.", 
        options: ["more and more", "less and less", "fewer and fewer", "most and most"], 
        correct: "more and more" 
    },
    { 
        q: "No sooner had he arrived ______ the rain started to pour down.", 
        options: ["than", "when", "then", "that"], 
        correct: "than" 
    },
    { 
        q: "Hardly ______ entered the office when the phone rang.", 
        options: ["had he", "he had", "did he", "has he"], 
        correct: "had he" 
    },

    // --- NHÓM 6: CÂU ĐÚNG / SAI (THỂ SAI KHIẾN & NGỮ PHÁP) ---
    { 
        q: "Cấu trúc: 'Anna got her brother to repair her bike' là đúng hay sai?", 
        options: ["Đúng", "Sai"], 
        correct: "Đúng" 
    },
    { 
        q: "Câu: 'He get his house renovated by a team' là đúng hay sai? (Gợi ý: Chia động từ)", 
        options: ["Đúng", "Sai"], 
        correct: "Sai" 
    },
    { 
        q: "Câu: 'Mr. Smith is an old customer and a honest man' là đúng hay sai?", 
        options: ["Đúng", "Sai"], 
        correct: "Sai" 
    },
    { 
        q: "Cấu trúc: 'We got our house painted last summer' (Thể bị động sai khiến) là đúng?", 
        options: ["Đúng", "Sai"], 
        correct: "Đúng" 
    },
    { 
        q: "Câu: 'The more he works, the most tired he feels' là đúng hay sai?", 
        options: ["Đúng", "Sai"], 
        correct: "Sai" 
    }
];
async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const joinId = urlParams.get('room');

    if (joinId) {
        roomId = joinId; isP1 = false;
        const { data } = await supabaseClient.from('rooms').update({ 
            p2_id: user.id, p2_name: user.email.split('@')[0], status: 'playing' 
        }).eq('id', roomId).select();
        if (data?.[0]) { startGame(data[0]); }
    } else {
        isP1 = true;
        const { data } = await supabaseClient.from('rooms').insert([{ 
            p1_id: user.id, p1_name: user.email.split('@')[0], status: 'waiting' 
        }]).select();
        if (data?.[0]) {
            roomId = data[0].id;
            document.getElementById('invite-link').innerText = window.location.origin + window.location.pathname + '?room=' + roomId;
            document.getElementById('room-link-container').classList.remove('hidden');
            document.getElementById('lobby-status').innerText = "Đang đợi đối thủ...";
        }
    }
    listenRealtime();
}

function listenRealtime() {
    supabaseClient.channel(`room:${roomId}`).on('postgres_changes', { 
        event: 'UPDATE', schema: 'public', table: 'rooms', filter: `id=eq.${roomId}` 
    }, payload => {
        const room = payload.new;
        playersData.p1_score = Number(room.p1_score) || 0;
        playersData.p2_score = Number(room.p2_score) || 0;
        document.getElementById('score-p1').innerText = playersData.p1_score;
        document.getElementById('score-p2').innerText = playersData.p2_score;

        if (room.status === 'playing' && document.getElementById('screen-game').classList.contains('hidden')) {
            startGame(room);
        }
        if (room.p1_idx >= myData.length && room.p2_idx >= myData.length) showFinalResult();
    }).subscribe();
}

function startGame(room) {
    document.getElementById('screen-lobby').classList.add('hidden');
    document.getElementById('screen-game').classList.remove('hidden');
    document.getElementById('name-p1').innerText = room.p1_name;
    document.getElementById('name-p2').innerText = room.p2_name || "Đối thủ";
    
    const bgm = document.getElementById('audio-bgm');
    bgm.volume = 0.15;
    bgm.play().catch(() => {});
    
    renderQuestion();
}

function startTimer() {
    clearInterval(timerInterval);
    timeLeft = 15;
    const bar = document.getElementById('timer-progress');
    bar.style.width = "100%";
    
    timerInterval = setInterval(() => {
        timeLeft--;
        bar.style.width = (timeLeft / 15 * 100) + "%";
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            submitAnswer("", ""); // Tự động nộp bài nếu hết giờ
        }
    }, 1000);
}

function renderQuestion() {
    if (myIdx >= myData.length) { 
        clearInterval(timerInterval);
        document.getElementById('q-text').innerText = "Hoàn thành! Đang chờ đối thủ...";
        document.getElementById('q-options').innerHTML = "";
        return; 
    }
    startTimer();
    const item = myData[myIdx];
    document.getElementById('q-text').innerText = item.q;
    document.getElementById('q-options').innerHTML = item.options.map(opt => 
        `<button class="opt-btn" onclick="submitAnswer('${opt}', '${item.correct}')">${opt}</button>`
    ).join('');
}

async function submitAnswer(selected, correct) {
    clearInterval(timerInterval);
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => b.disabled = true);

    let isCorrect = (selected === correct);
    if (isCorrect && selected !== "") {
        document.getElementById('audio-correct').play();
        btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct-flash'); });
    } else if (selected !== "") {
        document.getElementById('audio-wrong').play();
        document.getElementById('game-container').classList.add('shake');
        setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
        btns.forEach(b => {
            if(b.innerText === correct) b.classList.add('correct-flash');
            if(b.innerText === selected) b.classList.add('wrong-flash');
        });
    }

    myIdx++;
    // Lấy điểm mới nhất từ Database để tránh lỗi cộng dồn sai
    const { data: currentRoom } = await supabaseClient.from('rooms').select('*').eq('id', roomId).single();
    const scoreGain = isCorrect ? 4 : 0;
    
    const updateData = isP1 
        ? { p1_score: (Number(currentRoom.p1_score) || 0) + scoreGain, p1_idx: myIdx }
        : { p2_score: (Number(currentRoom.p2_score) || 0) + scoreGain, p2_idx: myIdx };

    await supabaseClient.from('rooms').update(updateData).eq('id', roomId);
    setTimeout(renderQuestion, 1000);
}

function showFinalResult() {
    document.getElementById('audio-bgm').pause();
    document.getElementById('screen-game').classList.add('hidden');
    document.getElementById('screen-result').classList.remove('hidden');
    const s1 = playersData.p1_score, s2 = playersData.p2_score;
    document.getElementById('winner-title').innerText = s1 > s2 ? "🏆 P1 THẮNG!" : (s2 > s1 ? "🏆 P2 THẮNG!" : "🤝 HÒA NHAU!");
    document.getElementById('final-summary').innerText = `Tỉ số: ${s1} - ${s2}`;
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
}

function copyLink() {
    navigator.clipboard.writeText(document.getElementById('invite-link').innerText);
    alert("Đã copy link!");
}

init();
</script>
</body>
</html>
